<div class="container-fluid p-4 p-md-5">
  <h2 class="display-5 display-md-4 fw-bold text-primary mb-4">Get In Touch</h2>

  <div class="row mb-5">
    <div class="col-12 col-md-8 col-lg-6 mx-auto">
      <div class="card border-0 shadow-sm p-3 p-md-4 mb-4">
        <h4 class="h6 text-primary mb-3">Contact Information</h4>
        <p class="text-muted mb-2 fs-7">
          <i class="fas fa-envelope me-2"></i>
          <a href="mailto:g.fulminar1199@aol.com" class="text-decoration-none text-dark">g.fulminar1199@aol.com</a>
        </p>
        <p class="text-muted mb-2 fs-7">
          <i class="fas fa-phone me-2"></i>
          <a href="tel:+639765450844" class="text-decoration-none text-dark">+63 976 545 0844</a>
        </p>
        <p class="text-muted mb-0 fs-7">
          <i class="fas fa-phone me-2"></i>
          <a href="tel:+639920635223" class="text-decoration-none text-dark">+63 992 063 5223</a>
        </p>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12 col-md-10 col-lg-8 mx-auto">
      <h4 class="h6 text-primary mb-4 text-start">Send Me a Message</h4>

      <form id="contactForm" class="text-start">
        <div class="mb-3">
          <label for="name" class="form-label fs-7">Full Name</label>
          <input type="text" class="form-control form-control-sm" id="name" name="name" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label fs-7">Email Address</label>
          <input type="email" class="form-control form-control-sm" id="email" name="email" required>
        </div>

        <div class="mb-3">
          <label for="subject" class="form-label fs-7">Subject</label>
          <input type="text" class="form-control form-control-sm" id="subject" name="subject" required>
        </div>

        <div class="mb-3">
          <label for="message" class="form-label fs-7">Message</label>
          <textarea class="form-control form-control-sm" id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-sm">
          <i class="fas fa-paper-plane me-2"></i>Send Message
        </button>
      </form>

      <p class="text-muted small mt-3 text-center fs-8">Your message will be sent to g.fulminar1199@aol.com</p>
    </div>
  </div>
