<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags for character encoding and responsive design -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gene's  Portfolio</title>
  
  <!-- SEO Meta tags for search engines and social media -->
  <meta name="description" content="Portfolio of Gene Ryan, a virtual‑assistant specialist showcasing projects, services, and contact information.">
  <meta property="og:title" content="Gene Ryan – VA Portfolio">
  <meta property="og:description" content="Explore my virtual‑assistant services and recent projects.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yourdomain.com/">
  <meta property="og:image" content="https://yourdomain.com/preview.jpg">
  
  <!-- Bootstrap CSS - Framework for responsive design -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Custom CSS file - Your personal styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Main container with flexbox layout (side-by-side layout) -->
  <div class="container-fluid h-100" style="display: flex; flex-wrap: wrap;">
    
    <!-- SIDEBAR MENU (Left side) - Collapsible on mobile -->
    <aside class="col-12 col-lg-3 p-3 d-flex flex-column sidebar" id="sidebar">
      <!-- Blue background box for menu -->
      <div class="sky-blue-bg rounded-4 shadow-lg flex-grow-1 p-4 d-flex flex-column">
        
        <!-- Profile Picture Section with Toggle Button -->
        <div class="text-center mb-4 profile-container position-relative">
          <img src="https://lh3.googleusercontent.com/a/ACg8ocKUmlEt_hrDbpV6rE9sRSOpgOh7M1b2UgpQAWKQfDFVFn4wdUzQNw=s288-c-no" alt="Gene Ryan" class="rounded-circle profile-pic" id="profilePic">
          <!-- Mobile Toggle Button -->
          <button class="menu-toggle d-lg-none" id="menuToggle" type="button" aria-label="Toggle menu">
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="text-center d-flex flex-column justify-content-center align-items-center flex-grow-1 menu-nav" id="menuNav" aria-label="Primary menu">
          <ul class="list-unstyled mb-0 w-100">
            
            <!-- Home Button -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="home" type="button">
                <i class="fas fa-home me-2"></i><span class="menu-label">Home</span>
              </button>
            </li>
            
            <!-- About Me Button -->
            <li class="mb-3">   
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="about" type="button">
                <i class="fas fa-user-circle me-2"></i><span class="menu-label">About me</span>
              </button>
            </li>

            
            <!-- Blog Button -->
            <li class="mb-3">   
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="blog" type="button">
                <i class="fas fa-blog me-2"></i><span class="menu-label">Blog</span>
              </button>
            </li>
            
            <!-- Projects Button -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="projects" type="button">
                <i class="fas fa-briefcase me-2"></i><span class="menu-label">Projects</span>
              </button>
            </li>

            <!-- Services Button -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="services" type="button">
                <i class="fas fa-concierge-bell me-2"></i><span class="menu-label">Services</span>
              </button>
            </li>
            
            <!-- Resume Button -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="resume" type="button">
                <i class="fas fa-file me-2"></i><span class="menu-label">Resume</span>
              </button>
            </li>
            
            <!-- Contact Button -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="contact" type="button">
                <i class="fas fa-envelope me-2"></i><span class="menu-label">Contact</span>
              </button>
            </li>

            <!-- Others Button (added) -->
            <li class="mb-3">
              <button class="d-block w-100 text-decoration-none text-dark fw-500 py-2 px-3 rounded-3 hover-effect border-0 bg-transparent menu-btn" data-section="others" type="button">
                <i class="fas fa-ellipsis-h me-2"></i><span class="menu-label">Others</span>
              </button>
            </li>

          </ul>
        </nav>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA (Right side) -->
    <main class="col-12 col-lg-9 p-2 p-md-3 p-lg-3 d-flex flex-column">
      <!-- White container that holds all content sections -->
      <section class="bg-white rounded-4 shadow-lg p-3 p-md-4 p-lg-5 d-flex flex-column justify-content-center align-items-center text-center">
        
        <!-- ==================== HOME SECTION ==================== -->
        <div id="home" class="section-content w-100">
          <div class="hero-content text-center">
            <!-- Large name heading - Responsive text -->
            <h1 class="hero-name fw-bold mb-3">
              Gene Ryan
            </h1>
            <!-- Job title -->
            <p class="hero-title fs-4 mb-5"> Software Developer</p>
            
            <!-- Social Media Links Section - Wraps on mobile -->
            <div class="social-links mb-4 flex-wrap">
              <!-- LinkedIn Link -->
              <a href="https://www.linkedin.com/in/gene-ryan-fulminar-933b18370/" target="_blank" class="social-link me-2 me-md-3">
                <i class="fab fa-linkedin"></i> <span class="d-none d-sm-inline">LinkedIn</span>
              </a>
              <!-- GitHub Link -->
              <a href="https://github.com/Genefulminar11" target="_blank" class="social-link me-2 me-md-3">
                <i class="fab fa-github"></i> <span class="d-none d-sm-inline">Github</span>
              </a>
              <!-- Facebook Link -->
              <a href="https://web.facebook.com/Gene.Biz1199" target="_blank" class="social-link me-2 me-md-3">
                <i class="fab fa-facebook"></i> <span class="d-none d-sm-inline">Facebook</span>
              </a>
              
            </div>

            <!-- Decorative line divider -->
            <div class="divider mx-auto mb-4"></div>
            <!-- Tagline -->
            <p class="text-muted fs-6" style="font-style: italic;">Dedicated to excellence and professional growth</p>
          </div>
        </div>

        <!-- ==================== ABOUT ME SECTION (placeholder) ==================== -->
        <div id="about" class="section-content d-none w-100">
          <!-- content will be loaded from about.html -->
        </div>
        <!-- ==================== BLOG SECTION ==================== -->
        <div id="blog" class="section-content d-none w-100">
                   <!-- content will be loaded from blog.html -->

        </div>

        <!-- ==================== PROJECTS SECTION (placeholder) ==================== -->
        <div id="projects" class="section-content d-none w-100">
          <!-- content will be loaded from projects.html -->
        </div>

        <!-- ==================== SERVICES SECTION (placeholder) ==================== -->
        <div id="services" class="section-content d-none w-100">
          <!-- content will be loaded from services.html -->
        </div>

<!-- ==================== RESUME SECTION (placeholder) ==================== -->
        <div id="resume" class="section-content d-none w-100">
          <!-- content will be loaded from resume.html -->
        </div>

        <!-- ==================== CONTACT SECTION (placeholder) ==================== -->
        <div id="contact" class="section-content d-none w-100">
          <!-- content will be loaded from contact.html -->
        </div>

        <!-- ==================== OTHERS SECTION (placeholder) ==================== -->
        <div id="others" class="section-content d-none w-100">
          <!-- content will be loaded from others.html -->
        </div>

      </section>
    </main>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- html2pdf library for converting HTML to PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- Load external custom JS -->
  <script src="script.js"></script>
</body>
