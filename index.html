<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gene's VA Portfolio</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container my-5">
    <!-- Use ordering so main appears first on small screens, then menus stack -->
    <div class="row align-items-start">
      <aside class="col-12 col-md-4 mb-4 order-md-1">
        <nav class="p-4 border rounded h-100 text-center" aria-label="Primary menu">
          
          <ul class="list-unstyled mb-0">
            <li>
              <a href="#about" class="d-block text-decoration-none text-primary">About me</a>
            </li>
            <li>
              <a href="#projects" class="d-block text-decoration-none text-primary">Projects</a>
            </li>
            <li>
              <a href="#contacts" class="d-block text-decoration-none text-primary">Contacts</a>
            </li>
            <li>
              <a href="#resume" class="d-block text-decoration-none text-primary">Resume</a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="col-12 col-md-8 mb-4 order-md-2">
        <section class="p-4 border rounded h-100 text-center text-md-start" aria-labelledby="hero-title">
          <h2 id="hero-title" class="h4 text-primary">Hello, I’m Gene</h2>
          <p class="text-muted mb-0">Welcome to my Virtual Assistant portfolio.</p>
        </section>
      </main>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
